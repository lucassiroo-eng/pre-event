name: Enrich company locations

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Which tier to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - "1"
          - "2"
      limit:
        description: "Max companies to process (0 = all)"
        required: false
        default: "0"
      dry_run:
        description: "Dry run — log only, no writes"
        required: false
        default: "false"
        type: boolean
      offset:
        description: "Skip first N companies (for parallel runs)"
        required: false
        default: "0"
      concurrency:
        description: "Parallel AI calls per batch (default 5)"
        required: false
        default: "5"
      batch_pause:
        description: "ms to wait between batches (default 6000)"
        required: false
        default: "6000"
      stagger_ms:
        description: "ms between each request in a batch (default 1200)"
        required: false
        default: "1200"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install script dependencies
        run: npm install @supabase/supabase-js

      - name: Verify env
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          AZURE_CONFIG: ${{ secrets.AZURE_CONFIG }}
        run: |
          node --version
          [ -n "$SUPABASE_URL" ] && echo "SUPABASE_URL: ok" || echo "SUPABASE_URL: MISSING"
          [ -n "$SUPABASE_SERVICE_KEY" ] && echo "SUPABASE_SERVICE_KEY: ok" || echo "SUPABASE_SERVICE_KEY: MISSING"
          [ -n "$HUBSPOT_TOKEN" ] && echo "HUBSPOT_TOKEN: ok" || echo "HUBSPOT_TOKEN: MISSING"
          [ -n "$AZURE_CONFIG" ] && echo "AZURE_CONFIG: ok" || echo "AZURE_CONFIG: MISSING"

      - name: Run enrichment
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          AZURE_CONFIG: ${{ secrets.AZURE_CONFIG }}
          TIER: ${{ inputs.tier }}
          OFFSET: ${{ inputs.offset }}
          LIMIT: ${{ inputs.limit }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
          CONCURRENCY: ${{ inputs.concurrency }}
          BATCH_PAUSE: ${{ inputs.batch_pause }}
          STAGGER_MS: ${{ inputs.stagger_ms }}
        run: node scripts/enrich-locations.mjs
