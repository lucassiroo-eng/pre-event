name: Enrich company locations

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Which tier to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - "1"
          - "2"
      limit:
        description: "Max companies to process (0 = all)"
        required: false
        default: "0"
      dry_run:
        description: "Dry run — log only, no writes"
        required: false
        default: "false"
        type: boolean

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6h ceiling for large batches

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run enrichment
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          AZURE_CONFIG: ${{ secrets.AZURE_CONFIG }}
          TIER: ${{ inputs.tier }}
          LIMIT: ${{ inputs.limit }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: node scripts/enrich-locations.mjs
